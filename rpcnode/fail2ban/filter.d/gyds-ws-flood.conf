# ══════════════════════════════════════════════════════════
#  GYDS Chain — fail2ban filter: WebSocket flood
#  Matches excessive WS upgrade attempts
#  Copy to: /etc/fail2ban/filter.d/gyds-ws-flood.conf
# ══════════════════════════════════════════════════════════

[Definition]

# WebSocket upgrade requests (101 = success, 426/400 = rejected)
failregex = ^<HOST> - .+ \[.+\] "GET /api/ws HTTP/\d\.\d" (?:400|426|429) \d+
            ^<HOST> - .+ \[.+\] "GET /api/ws HTTP/\d\.\d" 101 \d+

ignoreregex =
