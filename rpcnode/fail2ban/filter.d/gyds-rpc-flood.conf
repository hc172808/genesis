# ══════════════════════════════════════════════════════════
#  GYDS Chain — fail2ban filter: RPC rate flood
#  Matches Nginx 429 (Too Many Requests) responses
#  Copy to: /etc/fail2ban/filter.d/gyds-rpc-flood.conf
# ══════════════════════════════════════════════════════════

[Definition]

# Match the offending IP from an Nginx access log line with status 429
# Nginx default log format:
#   $remote_addr - $remote_user [$time_local] "$request" $status $bytes "$referer" "$ua"

failregex = ^<HOST> - .+ \[.+\] "(?:POST|GET) .+ HTTP/\d\.\d" 429 \d+

ignoreregex =
