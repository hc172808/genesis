# ══════════════════════════════════════════════════════════════
#  GYDS Chain — Prometheus + Grafana monitoring stack
#
#  Runs Prometheus (scrapes /metrics) and Grafana (visualizes).
#  Run on your monitoring server or locally.
#
#  Usage:
#    docker compose -f docker-compose.monitoring.yml up -d
#
#  Then open:
#    Grafana   → http://localhost:3000  (admin / gydschain)
#    Prometheus → http://localhost:9090
#
#  Import the dashboard:
#    Grafana → Dashboards → Import → Upload gyds-dashboard.json
# ══════════════════════════════════════════════════════════════

version: '3.9'

networks:
  monitoring:
    driver: bridge

volumes:
  prometheus_data: {}
  grafana_data:    {}

services:

  # ── Prometheus ───────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: gyds-prometheus
    restart: unless-stopped
    networks: [monitoring]
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    labels:
      - "com.gydschain.role=prometheus"

  # ── Grafana ──────────────────────────────────────────────────
  grafana:
    image: grafana/grafana-oss:latest
    container_name: gyds-grafana
    restart: unless-stopped
    networks: [monitoring]
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana-provisioning:/etc/grafana/provisioning:ro
    environment:
      GF_SECURITY_ADMIN_USER:     admin
      GF_SECURITY_ADMIN_PASSWORD: gydschain    # ← CHANGE THIS
      GF_USERS_ALLOW_SIGN_UP:     "false"
      GF_SERVER_DOMAIN:           localhost
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/gyds-dashboard.json
    depends_on: [prometheus]
    labels:
      - "com.gydschain.role=grafana"
