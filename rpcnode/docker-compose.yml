services:
  gyds-rpcnode:
    build: .
    container_name: gyds-rpcnode
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8545:8545"        # JSON-RPC HTTP
      - "8546:8546"        # WebSocket
      - "30303:30303"      # P2P TCP
      - "30303:30303/udp"  # P2P UDP
    volumes:
      - rpcnode-data:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "7"

volumes:
  rpcnode-data:
