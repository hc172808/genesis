# ══════════════════════════════════════════════════════════
#  GYDS Chain — fail2ban filter: P2P port flood
#  Detects excessive connection attempts to P2P port 30303
#  Copy to: /etc/fail2ban/filter.d/gyds-p2p-flood.conf
# ══════════════════════════════════════════════════════════

[Definition]

# UFW log: blocked packets to P2P port
failregex = ^\[UFW BLOCK\] IN=\S+ .+ SRC=<HOST> .+ DPT=30303\b

ignoreregex =
