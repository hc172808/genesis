# ══════════════════════════════════════════════════════════
#  GYDS Chain — fail2ban filter: validator RPC probe
#  Detects any external connection attempt to port 8545
#  which should NEVER be accessible from outside.
#  Copy to: /etc/fail2ban/filter.d/gyds-validator-rpc-probe.conf
# ══════════════════════════════════════════════════════════

[Definition]

# UFW log format:
#   [UFW BLOCK] IN=eth0 OUT= MAC=... SRC=1.2.3.4 DST=... PROTO=TCP ... DPT=8545

failregex = ^\[UFW BLOCK\] IN=\S+ .+ SRC=<HOST> .+ DPT=8545\b

ignoreregex =
