# ─────────────────────────────────────────────────────────────────────────────
# Build → Push → Redeploy
#
# Triggers on every push to `main`.
# Builds the Docker image, pushes it to GitHub Container Registry (GHCR),
# then calls the server webhook so the new image is deployed instantly.
#
# Required GitHub repository secrets (Settings → Secrets → Actions):
#   VITE_SUPABASE_URL               — your Supabase project URL
#   VITE_SUPABASE_PUBLISHABLE_KEY   — your Supabase anon/publishable key
#   VITE_WHATSAPP_SUPPORT_NUMBER    — WhatsApp number (optional)
#   DEPLOY_WEBHOOK_URL              — http://YOUR_SERVER_IP:9000/hooks/redeploy
#   DEPLOY_WEBHOOK_SECRET           — random secret string (match setup-ubuntu.sh)
# ─────────────────────────────────────────────────────────────────────────────

name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual trigger from GitHub Actions UI

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # owner/repo  (all lowercase)

jobs:
  build-and-push:
    name: Build Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # needed to push to GHCR

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx (multi-platform + build cache)
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Pass Supabase secrets as build-args (they get baked into the bundle)
          build-args: |
            VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
            VITE_SUPABASE_PUBLISHABLE_KEY=${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
            VITE_WHATSAPP_SUPPORT_NUMBER=${{ secrets.VITE_WHATSAPP_SUPPORT_NUMBER }}
            GITHUB_SHA=${{ github.sha }}
          # GitHub Actions cache — dramatically speeds up repeated builds
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-server-image:
    name: Build build-server Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata for build-server
        id: meta-bs
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-build-server
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build and push build-server image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.build-server
          push: true
          tags: ${{ steps.meta-bs.outputs.tags }}
          labels: ${{ steps.meta-bs.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  redeploy:
    name: Trigger server redeploy
    runs-on: ubuntu-latest
    needs: [build-and-push, build-server-image]
    if: ${{ secrets.DEPLOY_WEBHOOK_URL != '' }}   # skip if no server configured

    steps:
      - name: Call deploy webhook
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.DEPLOY_WEBHOOK_URL }}" \
            -H "X-Webhook-Secret: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}" \
            --max-time 30)
          echo "Webhook responded with HTTP $HTTP_STATUS"
          if [[ "$HTTP_STATUS" != "200" && "$HTTP_STATUS" != "204" ]]; then
            echo "::warning::Webhook call failed (HTTP $HTTP_STATUS). Watchtower will still redeploy within 5 minutes."
          fi
