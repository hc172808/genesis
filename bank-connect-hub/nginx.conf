# ─────────────────────────────────────────────────────────────────────────────
# Virtual Bank — nginx vhost
# Serves the React SPA, proxies the litenode RPC, and applies WAF-like rules.
# This file is copied to /etc/nginx/conf.d/virtualbank.conf by setup-ubuntu.sh.
# ─────────────────────────────────────────────────────────────────────────────

# ── Rate-limit zones (defined at http level via /etc/nginx/nginx.conf include) ──
# These are referenced below; setup-ubuntu.sh injects them into nginx.conf.
# limit_req_zone $binary_remote_addr zone=app:10m     rate=30r/m;
# limit_req_zone $binary_remote_addr zone=rpc:10m     rate=120r/m;
# limit_req_zone $binary_remote_addr zone=api:10m     rate=60r/m;
# limit_conn_zone $binary_remote_addr zone=connlimit:10m;

server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Connection limit ───────────────────────────────────────────────────
    limit_conn connlimit 20;

    # ── Compression ────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/json application/xml
        image/svg+xml font/woff2;

    # ── Security headers ───────────────────────────────────────────────────
    add_header X-Frame-Options              "SAMEORIGIN"        always;
    add_header X-Content-Type-Options       "nosniff"           always;
    add_header X-XSS-Protection             "1; mode=block"     always;
    add_header Referrer-Policy              "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy           "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security    "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy
        "default-src 'self'; \
         script-src 'self' 'unsafe-inline' 'unsafe-eval'; \
         style-src 'self' 'unsafe-inline'; \
         img-src 'self' data: blob: https:; \
         font-src 'self' data:; \
         connect-src 'self' https://*.supabase.co wss://*.supabase.co https://bsc-dataseed.binance.org https://rpc.ankr.com; \
         frame-ancestors 'none';"
        always;

    # ── Block bad bots and scanners ────────────────────────────────────────
    # Add any known-bad User-Agents here.
    if ($http_user_agent ~* (masscan|zgrab|sqlmap|nikto|nmap|havij|acunetix|nessus|openvas)) {
        return 444;  # 444 = close connection without response
    }

    # ── Block common attack patterns in URI ────────────────────────────────
    if ($request_uri ~* (\.php|\.asp|\.cgi|etc/passwd|proc/self|union.*select|<script)) {
        return 444;
    }

    # ── Block requests with no User-Agent (most scanners) ─────────────────
    if ($http_user_agent = "") {
        return 444;
    }

    # ── Health check ───────────────────────────────────────────────────────
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── Litenode RPC proxy ─────────────────────────────────────────────────
    # The frontend calls /rpc — nginx proxies it to the Go litenode container.
    location /rpc {
        limit_req zone=rpc burst=30 nodelay;
        limit_req_status 429;

        proxy_pass         http://litenode:8545;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 10s;

        # CORS (litenode also sets these, but nginx handles preflight faster)
        add_header Access-Control-Allow-Origin  "$http_origin" always;
        add_header Access-Control-Allow-Methods "POST, GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, X-Idempotency-Key" always;
        if ($request_method = OPTIONS) { return 204; }
    }

    # ── Litenode health + metrics ──────────────────────────────────────────
    location /rpc/health  { proxy_pass http://litenode:8545/health;  }
    location /rpc/metrics { proxy_pass http://litenode:8545/metrics; allow 127.0.0.1; deny all; }
    location /rpc/nonce/  { proxy_pass http://litenode:8545/nonce/;  }

    # ── Runtime env config — never cache (changes per deployment) ────────
    location = /env-config.js {
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        add_header Pragma "no-cache";
        try_files $uri =404;
    }

    # ── Long-lived cache for hashed assets ────────────────────────────────
    location ~* \.(js|css|woff2?|ttf|eot|otf|ico|png|jpg|jpeg|gif|svg|webp)$ {
        limit_req zone=app burst=60 nodelay;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Service-worker / manifest — never cached ───────────────────────────
    location ~* ^/(sw\.js|manifest\.webmanifest)$ {
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # ── Build server — APK builder, PWA builder, push notifications ───────
    # In Docker:      "build-server" resolves via Docker DNS (container name)
    # On bare-metal:  add "127.0.0.1 build-server" to /etc/hosts (setup-ubuntu.sh does this)
    location /api/ {
        limit_req zone=api burst=10 nodelay;
        limit_req_status 429;

        proxy_pass         http://build-server:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        "";   # required for SSE keepalive
        proxy_read_timeout 600s;                   # APK builds take several minutes
        proxy_send_timeout 60s;
        proxy_buffering    off;                    # MUST be off for SSE live logs
        chunked_transfer_encoding on;
    }

    # ── SPA fallback ───────────────────────────────────────────────────────
    location / {
        limit_req zone=app burst=20 nodelay;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # ── Logging ────────────────────────────────────────────────────────────
    access_log /var/log/nginx/virtualbank-access.log;
    error_log  /var/log/nginx/virtualbank-error.log warn;
}
