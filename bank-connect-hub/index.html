<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Virtual Bank - Secure Digital Banking Services</title>
    <meta name="description" content="Experience modern virtual banking with secure digital wallet, instant payments, and comprehensive financial services. Manage your money anytime, anywhere." />
    <meta name="author" content="Virtual Bank" />
    <meta name="keywords" content="virtual banking, digital wallet, mobile banking, online payments, financial services" />

    <meta property="og:title" content="Virtual Bank - Secure Digital Banking Services" />
    <meta property="og:description" content="Experience modern virtual banking with secure digital wallet, instant payments, and comprehensive financial services." />
    <meta property="og:type" content="website" />
    <meta name="theme-color" content="#0B1B3F" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@VirtualBank" />

    <!-- Runtime environment config (injected by docker/generate-env.sh at container start) -->
    <!-- In development this file doesn't exist; the app falls back to import.meta.env -->
    <script src="/env-config.js" onerror="console.info('env-config.js not found — using build-time env vars (dev mode)')"></script>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Virtual Bank" />
    <meta name="mobile-web-app-capable" content="yes" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ("serviceWorker" in navigator && location.protocol === "https:") {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js").catch(() => {});
        });
      }
    </script>
  </body>
</html>
