# ─────────────────────────────────────────────────────────────────────────────
# Virtual Bank — Production Docker Compose stack
#
# Services:
#   virtualbank  — React SPA served by nginx
#   litenode     — Go Ethereum JSON-RPC proxy (double-spend guard, rate limit)
#   watchtower   — Auto-pulls new images from GHCR on push
#   webhook      — Instant redeploy trigger from GitHub Actions
#
# Usage (Portainer):
#   Stacks → Add Stack → Repository → point at your GitHub repo
#   Set env vars in the "Environment variables" section
#
# Usage (CLI):
#   cp .env.example .env && nano .env
#   docker compose up -d
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── React SPA ──────────────────────────────────────────────────────────────
  virtualbank:
    image: ghcr.io/${GITHUB_USER}/${GITHUB_REPO}:latest
    container_name: virtualbank
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:80"
    networks:
      - frontend
    depends_on:
      litenode:
        condition: service_healthy
      build-server:
        condition: service_started
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    # ── Runtime env injection (shared DB, per-server config) ──────────────
    # These vars are read by docker/generate-env.sh at container startup and
    # written into /usr/share/nginx/html/env-config.js.
    # All servers can share the same Docker image — just change .env per server.
    environment:
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_PUBLISHABLE_KEY=${VITE_SUPABASE_PUBLISHABLE_KEY}
      - VITE_SUPABASE_PROJECT_ID=${VITE_SUPABASE_PROJECT_ID:-}
      - VITE_WHATSAPP_SUPPORT_NUMBER=${VITE_WHATSAPP_SUPPORT_NUMBER:-}
      - NODE_ENV=${NODE_ENV:-production}
      - APP_PORT=${APP_PORT:-3000}
    # ── Security hardening ────────────────────────────────────────────────
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /var/cache/nginx:size=64m,mode=0755
      - /var/run:size=4m,mode=0755
      - /tmp:size=16m,mode=1777
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE   # needed to bind port 80
    # ── Resource limits ───────────────────────────────────────────────────
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
        reservations:
          memory: 64M
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Go Lite-node (Ethereum JSON-RPC proxy) ─────────────────────────────────
  litenode:
    build:
      context: ./litenode
      dockerfile: Dockerfile
    image: virtualbank-litenode:local
    container_name: litenode
    restart: unless-stopped
    networks:
      - frontend
      - backend
    environment:
      - LISTEN_ADDR=:8545
      - UPSTREAM_RPC=${UPSTREAM_RPC:-https://bsc-dataseed.binance.org}
      - RATE_PER_MIN=${LITENODE_RATE_PER_MIN:-120}
      - CACHE_BLOCKS=${LITENODE_CACHE_BLOCKS:-64}
      - DEDUP_TTL=${LITENODE_DEDUP_TTL:-60s}
      - NONCE_TTL=${LITENODE_NONCE_TTL:-5m}
      - LOG_LEVEL=${LITENODE_LOG_LEVEL:-info}
    security_opt:
      - no-new-privileges:true
    read_only: true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          memory: 32M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8545/health | grep -q '\"status\":\"ok\"'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # Do not expose port externally — nginx proxies /rpc → litenode:8545
    expose:
      - "8545"

  # ── Watchtower — auto-pull & restart on new image ──────────────────────────
  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    networks:
      - backend
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/.docker/config.json:/config.json:ro
    environment:
      - WATCHTOWER_POLL_INTERVAL=${WATCHTOWER_INTERVAL:-300}
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_CLEANUP=true
      # Optional: WATCHTOWER_NOTIFICATION_URL=slack://...
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 32M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ── Webhook receiver — instant redeploy from GitHub Actions ───────────────
  webhook:
    image: almir/webhook:latest
    container_name: virtualbank-webhook
    restart: unless-stopped
    networks:
      - backend
    ports:
      - "${WEBHOOK_PORT:-9000}:9000"
    volumes:
      - ./webhook-hooks.json:/etc/webhook/hooks.json:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker:ro
    command: ["-hooks=/etc/webhook/hooks.json", "-verbose"]
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 32M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ── Build server — APK builder, PWA builder, push notifications ────────────
  # Includes: Node.js 20 + OpenJDK 17 + Android SDK
  # nginx proxies /api/* to this container (see nginx.conf)
  build-server:
    build:
      context: .
      dockerfile: Dockerfile.build-server
    image: virtualbank-build-server:local
    container_name: virtualbank-build-server
    restart: unless-stopped
    expose:
      - "3001"
    networks:
      - frontend
    volumes:
      - build-server-data:/app/.local
      # Docker socket — allows admin to start/stop the litenode container
      # Security note: this grants the build-server Docker access on the host.
      # Remove this line if you do not need litenode management from the admin UI.
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY:-}
      - VAPID_EMAIL=${VAPID_EMAIL:-admin@virtualbank.app}
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3001/api/build/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ── Networks ───────────────────────────────────────────────────────────────────
networks:
  frontend:
    name: virtualbank-frontend
    driver: bridge
  backend:
    name: virtualbank-backend
    driver: bridge
    internal: false  # watchtower/webhook need internet access

# ── Volumes ────────────────────────────────────────────────────────────────────
volumes:
  build-server-data:
    name: virtualbank-build-server-data
