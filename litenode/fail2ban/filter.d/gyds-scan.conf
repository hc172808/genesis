# ══════════════════════════════════════════════════════════
#  GYDS Chain — fail2ban filter: scanner / probe detection
#  Matches 404 hits on non-existent paths or suspicious
#  GET requests on a JSON-RPC-only endpoint
#  Copy to: /etc/fail2ban/filter.d/gyds-scan.conf
# ══════════════════════════════════════════════════════════

[Definition]

# 404 — probing for paths that don't exist
failregex = ^<HOST> - .+ \[.+\] "GET .+ HTTP/\d\.\d" 404 \d+
            ^<HOST> - .+ \[.+\] "HEAD .+ HTTP/\d\.\d" 404 \d+

# GET on the JSON-RPC root (attackers fingerprinting the endpoint)
            ^<HOST> - .+ \[.+\] "GET / HTTP/\d\.\d" 4[0-9][0-9] \d+

# Null / empty request line (connection scanner)
            ^<HOST> - .+ \[.+\] "-" 400 \d+

# Common exploit paths
            ^<HOST> - .+ \[.+\] "(?:GET|POST) (?:/admin|/wp-admin|/phpMyAdmin|/.env|/config|/backup|/shell|/cmd|/cgi-bin) .+" \d+ \d+

ignoreregex = ^<HOST> - .+ \[.+\] "GET /health .+"
              ^<HOST> - .+ \[.+\] "GET / .+"
