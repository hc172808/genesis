# ══════════════════════════════════════════════════════════
#  GYDS Chain — fail2ban filter: bad / malformed RPC
#  Matches Nginx 400 (Bad Request) responses
#  Copy to: /etc/fail2ban/filter.d/gyds-rpc-badrpc.conf
# ══════════════════════════════════════════════════════════

[Definition]

# Match 400 (bad request) — malformed JSON, invalid headers
failregex = ^<HOST> - .+ \[.+\] ".+" 400 \d+
            ^<HOST> - .+ \[.+\] "-" 400 \d+

# Ignore empty/harmless requests
ignoreregex =
